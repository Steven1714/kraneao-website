            {q: "89. Si aumenta la resistencia al retorno venoso, el Gasto Cardíaco:", a: ["Disminuirá drásticamente", "Aumentará", "Igual", "Hipertensión"], c: "Disminuirá drásticamente"},
            {q: "90. Factor que aumenta flujo coronario en ejercicio:", a: ["Necesidad de oxígeno tisular (Adenosina)", "Presión VD", "Contracción por simpático", "Llenado sistólico"], c: "Necesidad de oxígeno tisular (Adenosina)"},
            {q: "91. Flujo coronario del ventrículo izquierdo:", a: ["Se corta en sístole y fluye en diástole", "Solo sístole", "Constante", "Solo nodo SA"], c: "Se corta en sístole y fluye en diástole"},
            {q: "92. Insuficiencia Cardíaca Izquierda provoca:", a: ["Congestión y Edema Pulmonar", "Edema piernas", "Ceguera", "Bazo grande"], c: "Congestión y Edema Pulmonar"},
            {q: "93. Insuficiencia Cardíaca Derecha provoca:", a: ["Edema periférico, ascitis y hepatomegalia", "Edema pulmonar", "Infarto cerebral", "Asma"], c: "Edema periférico, ascitis y hepatomegalia"},
            {q: "94. Definición de Shock Circulatorio:", a: ["Reducción generalizada del flujo que daña tejidos", "Subida PA > 200", "Dolor pecho", "Impacto AV"], c: "Reducción generalizada del flujo que daña tejidos"},
            {q: "95. Shock Hipovolémico es causado por:", a: ["Pérdida masiva de volumen de sangre o plasma", "Falla cardíaca", "Alergia", "Bacterias"], c: "Pérdida masiva de volumen de sangre o plasma"},
            {q: "96. Shock Cardiogénico ocurre cuando:", a: ["El corazón dañado no tiene fuerza de bombeo", "Pierde 30% sangre", "Vasodilatación anestesia", "Falla riñón"], c: "El corazón dañado no tiene fuerza de bombeo"},
            {q: "97. Shock Neurogénico es causado por:", a: ["Pérdida de tono vasomotor simpático", "Corte médula", "Vago detiene corazón", "Arterias cerradas"], c: "Pérdida de tono vasomotor simpático"},
            {q: "98. El Shock Anafiláctico libera sistémicamente:", a: ["Histamina", "Adrenalina", "Acetilcolina", "EPO"], c: "Histamina"},
            {q: "99. Vuelve al shock 'Irreversible':", a: ["Isquemia cardíaca que debilita el bombeo", "Barorreceptores", "Beber mucha agua", "Cicatriz capilar"], c: "Isquemia cardíaca que debilita el bombeo"},
            {q: "100. Vasos cerebrales se dilatan intensamente ante aumento de:", a: ["Dióxido de Carbono ($CO_2$)", "Glucosa", "Oxígeno", "Serotonina"], c: "Dióxido de Carbono ($CO_2$)"}
        ];

        let cur = 0, points = 0, solved = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function load() {
            solved = false;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('fb').classList.add('hidden');
            const data = quizData[cur];
            
            // LIMPIEZA AUTOMÁTICA DE NÚMEROS
            document.getElementById('q-text').textContent = data.q.replace(/^[0-9]+\.\s*/, "");
            
            document.getElementById('idx').textContent = cur + 1;
            document.getElementById('total-count').textContent = quizData.length;
            document.getElementById('bar').style.width = ((cur + 1) / quizData.length * 100) + '%';
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            const shuffledOptions = shuffle([...data.a]);
            
            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-fade-in';
                btn.innerHTML = `<span class="w-10 h-10 rounded-full border-2 border-gray-100 flex items-center justify-center text-xs font-black mr-2 bg-gray-50">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => check(opt, btn, data.c, data.e);
                container.appendChild(btn);
            });
        }

        function check(selected, btn, correct, explanation) {
            if(solved) return;
            solved = true;
            const btns = document.querySelectorAll('.option-btn');
            
            if(selected === correct) {
                points++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                btns.forEach(b => { if(b.textContent.includes(correct)) b.classList.add('correct'); });
            }

            if(explanation) {
                const fb = document.getElementById('fb');
                fb.innerHTML = `<strong>ANÁLISIS DE GUYTON:</strong> ${explanation}`;
                fb.className = "mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 " + (selected===correct ? "bg-green-50 border-green-500 text-green-700" : "bg-red-50 border-red-500 text-red-700");
                fb.classList.remove('hidden');
            }

            btns.forEach(b => b.disabled = true);
            document.getElementById('next').classList.remove('hidden');
        }

        document.getElementById('next').onclick = () => {
            cur++;
            if(cur < quizData.length) {
                load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.getElementById('card').classList.add('hidden');
                document.getElementById('res').classList.remove('hidden');
                document.getElementById('score').textContent = Math.round((points/quizData.length)*100);
            }
        };

        window.onload = load;
    </script>
</body>
</html>
