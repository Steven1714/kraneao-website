    <script>
        const quizData = [
            // 1. ANATOMÍA Y CARACTERÍSTICAS DEL NODO SINUSAL
            {q: "1. ¿Cuál es el 'marcapasos fisiológico natural' que rige el ritmo del corazón humano en condiciones normales?", a: ["El Nodo Sinusal (Sinoauricular)", "El Nodo Auriculoventricular (AV)", "El Haz de His", "La Red de Purkinje"], c: "El Nodo Sinusal (Sinoauricular)", e: "Basado en Guyton, el nodo SA tiene la frecuencia de descarga más rápida de todos los tejidos autoexcitables."},
            {q: "2. Anatómicamente, ¿dónde se localiza de forma exacta el Nodo Sinusal?", a: ["En la pared posterolateral superior de la aurícula derecha, inmediatamente inferior y lateral a la desembocadura de la vena cava superior", "En la porción inferior del tabique interauricular", "En el ápex del ventrículo derecho", "En el tabique interventricular superior"], c: "En la pared posterolateral superior de la aurícula derecha, inmediatamente inferior y lateral a la desembocadura de la vena cava superior"},
            {q: "3. ¿Cuál es el tamaño aproximado de la banda elipsoide que conforma el Nodo Sinusal?", a: ["3 mm de ancho, 15 mm de longitud y 1 mm de grosor", "10 mm de ancho, 50 mm de longitud y 5 mm de grosor", "1 mm de ancho, 3 mm de longitud y 0.1 mm de grosor", "20 mm de diámetro esférico"], c: "3 mm de ancho, 15 mm de longitud y 1 mm de grosor"},
            {q: "4. A nivel microscópico, ¿cómo difieren las fibras del Nodo Sinusal de las fibras musculares auriculares circundantes?", a: ["Las fibras del Nodo SA casi no tienen filamentos musculares contráctiles y su diámetro es de apenas 3 a 5 micrómetros", "Tienen un diámetro gigantesco para almacenar calcio", "Tienen una enorme cantidad de sarcómeros organizados", "Poseen una gruesa vaina de mielina"], c: "Las fibras del Nodo SA casi no tienen filamentos musculares contráctiles y su diámetro es de apenas 3 a 5 micrómetros"},
            {q: "5. ¿Por qué las fibras del Nodo Sinusal logran propagar su potencial de acción inmediatamente hacia la pared de la aurícula derecha?", a: ["Porque las fibras del nodo sinusal se conectan directamente con las fibras musculares auriculares", "Porque utilizan neurotransmisores químicos", "Porque están separadas por un anillo fibroso", "Porque usan el sistema linfático"], c: "Porque las fibras del nodo sinusal se conectan directamente con las fibras musculares auriculares"},
            {q: "6. ¿Cuál es la frecuencia de descarga rítmica en reposo intrínseca del Nodo Sinusal humano normal?", a: ["Entre 70 y 80 latidos por minuto", "Entre 40 y 60 lpm", "Entre 15 y 40 lpm", "Entre 100 y 120 lpm"], c: "Entre 70 y 80 latidos por minuto"},
            {q: "7. ¿Qué arteria proporciona principalmente el flujo sanguíneo y los nutrientes al Nodo Sinusal?", a: ["La arteria del nodo sinusal (rama de la coronaria derecha en el 60%)", "La arteria descendente anterior", "La arteria circunfleja", "La vena cava superior"], c: "La arteria del nodo sinusal (rama de la coronaria derecha en el 60%)"},
            {q: "8. ¿Cuál de las siguientes afirmaciones sobre la capacidad contráctil del Nodo Sinusal es correcta?", a: ["Prácticamente no se contraen, su función es la generación del impulso", "Su contracción es más fuerte que la ventricular", "Generan el primer ruido cardíaco", "Contribuyen al 50% de la eyección"], c: "Prácticamente no se contraen, su función es la generación del impulso"},
            {q: "9. ¿Por qué el Nodo Sinusal es el que 'manda' en el corazón y no el Nodo AV u otras fibras?", a: ["Porque su frecuencia de descarga intrínseca es más rápida, despolarizando a las demás antes de que alcancen su umbral", "Porque su potencial es el más negativo", "Porque el cerebro lo controla de forma exclusiva", "Porque es la única estructura con calcio"], c: "Porque su frecuencia de descarga intrínseca es más rápida, despolarizando a las demás antes de que alcancen su umbral"},
            {q: "10. Las fibras del nodo sinusal tienen una disposición celular y tisular que se localiza fundamentalmente:", a: ["En el plano subepicárdico", "En el endocardio profundo", "Flotando en el lumen", "Dentro de la tricúspide"], c: "En el plano subepicárdico"},

            // 2. ELECTROFISIOLOGÍA DEL NODO SINUSAL
            {q: "11. ¿Cuál es el potencial de membrana en 'reposo' típico de las fibras del Nodo Sinusal?", a: ["-55 a -60 mV", "-85 a -90 mV", "+20 a +35 mV", "-100 mV"], c: "-55 a -60 mV"},
            {q: "12. ¿Por qué el reposo del Nodo Sinusal es mucho menos negativo (-55 mV) que el ventricular?", a: ["Porque sus membranas son naturalmente muy permeables a Sodio ($Na^+$) y Calcio ($Ca^{++}$)", "Porque no tiene bomba Na/K", "Por fuga inmensa de cloruro", "Porque el potasio es cero"], c: "Porque sus membranas son naturalmente muy permeables a Sodio ($Na^+$) y Calcio ($Ca^{++}$)"},
            {q: "13. Debido a que el voltaje de reposo es de -55 mV, ¿qué sucede con los canales RÁPIDOS de sodio en el nodo SA?", a: ["Se encuentran permanentemente inactivos (bloqueados)", "Se abren constantemente", "Funcionan igual que en el ventrículo", "Se transforman en canales de potasio"], c: "Se encuentran permanentemente inactivos (bloqueados)", e: "Para que los canales rápidos de Na se activen, el reposo debe ser más negativo a -70mV."},
            {q: "14. ¿Qué canales iónicos son responsables de producir el pico del potencial de acción (fase 0) en el Nodo Sinusal?", a: ["Los canales lentos de Sodio-Calcio (tipo L)", "Canales de Potasio voltaje-dependientes", "Receptores muscarínicos", "Canales de fuga de Cloro"], c: "Los canales lentos de Sodio-Calcio (tipo L)"},
            {q: "15. ¿Qué característica temporal fundamental diferencia el potencial del Nodo Sinusal del potencial ventricular?", a: ["El potencial sinusal es más lento y redondeado", "Dura 2 segundos", "Tiene una meseta más larga", "Alcanza los +150 mV"], c: "El potencial sinusal es más lento y redondeado"},
            {q: "16. Mecanismo biofísico de la 'Autoexcitación' (Despolarización Diastólica Espontánea) del Nodo Sinusal:", a: ["Lenta entrada continua de Sodio (Corriente 'Funny' o $I_f$)", "Cierre repentino de bomba Na/K", "Salida explosiva de Calcio mitocondrial", "Entrada rítmica de Cloruro"], c: "Lenta entrada continua de Sodio (Corriente 'Funny' o $I_f$)"},
            {q: "17. ¿Cuál es el valor aproximado del umbral de disparo en el Nodo Sinusal?", a: ["-40 mV", "-65 mV", "0 mV", "-90 mV"], c: "-40 mV"},
            {q: "18. Una vez alcanzado el umbral (-40 mV), ¿qué evento iónico masivo genera el potencial de acción?", a: ["Se abren repentinamente los canales de Calcio tipo L", "Se abren los canales rápidos de Sodio", "Se cierran los canales de Potasio", "Ocurre asístole"], c: "Se abren repentinamente los canales de Calcio tipo L"},
            {q: "19. ¿Qué dos eventos biofísicos causan la REPOLARIZACIÓN de la fibra del Nodo Sinusal?", a: ["Inactivación de canales de Calcio y apertura de canales de Potasio ($K^+$)", "Cierre de sodio y entrada de cloro", "Bomba SERCA absorbiendo potasio", "Contracción auricular"], c: "Inactivación de canales de Calcio y apertura de canales de Potasio ($K^+$)"},
            {q: "20. Tras el potencial, el nodo sinusal se hiperpolariza. ¿Por qué vuelve a subir hacia el umbral?", a: ["Porque los canales de Potasio se cierran lentamente y la filtración de Sodio ($I_f$) gana de nuevo", "Por estímulo vagal", "Por cristalización de calcio", "Por receptores nicotínicos"], c: "Porque los canales de Potasio se cierran lentamente y la filtración de Sodio ($I_f$) gana de nuevo"},

            // 3. VÍAS INTERNODALES Y CONDUCCIÓN AURICULAR
            {q: "21. ¿A qué velocidad se propaga el impulso por el músculo auricular ordinario?", a: ["0.3 m/s", "100 m/s", "4.0 m/s", "0.05 m/s"], c: "0.3 m/s"},
            {q: "22. Velocidad de conducción en las vías internodales especializadas:", a: ["Aproximadamente 1 metro por segundo", "0.1 m/s", "5 m/s", "Velocidad de la luz"], c: "Aproximadamente 1 metro por segundo"},
            {q: "23. ¿Cómo se llama la banda que lleva el impulso rápidamente a la aurícula izquierda?", a: ["Fascículo de Bachmann", "Vía de Wenckebach", "Vía de Thorel", "Haz de His"], c: "Fascículo de Bachmann"},
            {q: "24. Nombre epónimo del tracto internodal MEDIO:", a: ["Tracto de Wenckebach", "Tracto de Thorel", "Tracto de Bachmann", "Haz de Kent"], c: "Tracto de Wenckebach"},
            {q: "25. Nombre epónimo del tracto internodal POSTERIOR:", a: ["Tracto de Thorel", "Tracto de Bachmann", "Tracto de Wenckebach", "Red de Purkinje"], c: "Tracto de Thorel"},
            {q: "26. ¿Por qué las vías internodales conducen más rápido (1 m/s) que el músculo común?", a: ["Contienen células especializadas similares a las fibras de Purkinje", "Tienen vaina de mielina", "Son nervios motores", "Carecen de membrana"], c: "Contienen células especializadas similares a las fibras de Purkinje"},
            {q: "27. Tiempo que tarda el impulso en viajar del Nodo Sinusal al Nodo AV:", a: ["0.03 segundos", "0.13 s", "1.0 s", "0.001 s"], c: "0.03 segundos"},
            {q: "28. Propósito primario de la Banda de Bachmann:", a: ["Asegurar la contracción simultánea de ambas aurículas", "Conducir directo a ventrículos", "Evitar contracción auricular", "Frenar el impulso"], c: "Asegurar la contracción simultánea de ambas aurículas"},
            {q: "29. ¿Qué onda del ECG representa la despolarización auricular?", a: ["La onda P", "Complejo QRS", "Onda T", "Onda U"], c: "La onda P"},
            {q: "30. Si se cortan las vías internodales, ¿llegaría el impulso al nodo AV?", a: ["Sí, por el músculo ordinario pero con retraso", "No, bloqueo completo", "No, el nodo AV se apaga", "Llegaría más rápido"], c: "Sí, por el músculo ordinario pero con retraso"},

            // 4. NODO AURICULOVENTRICULAR (EL RETRASO)
            {q: "31. ¿Dónde se localiza el Nodo Auriculoventricular (AV)?", a: ["Pared posterolateral aurícula derecha, tras válvula tricúspide", "Ápice VI", "Cara externa AI", "Centro del tabique"], c: "Pared posterolateral aurícula derecha, tras válvula tricúspide"},
            {q: "32. Función fisiológica VITAL del Nodo Auriculoventricular:", a: ["Retrasar el impulso hacia los ventrículos", "Acelerar el impulso a 5 m/s", "Contraer el tabique", "Oxigenar Purkinje"], c: "Retrasar el impulso hacia los ventrículos"},
            {q: "33. ¿Por qué es vital el retraso en el Nodo AV?", a: ["Permitir el vaciado auricular (patada auricular) antes de la sístole ventricular", "Ahorrar ATP", "Cerrar semilunares", "Relajación isométrica"], c: "Permitir el vaciado auricular (patada auricular) antes de la sístole ventricular"},
            {q: "34. ¿Cuánto tiempo se retrasa el impulso SOLAMENTE dentro del propio Nodo AV?", a: ["0.09 segundos", "0.13 s", "0.04 s", "0.16 s"], c: "0.09 segundos"},
            {q: "35. Retraso extra en la porción penetrante del Haz de His:", a: ["0.04 segundos", "0.09 s", "0.13 s", "0.03 s"], c: "0.04 segundos"},
            {q: "36. Retraso TOTAL que sufre el impulso en la zona del nodo AV (Nodo + Haz):", a: ["0.13 segundos", "0.16 s", "0.09 s", "1.0 s"], c: "0.13 segundos"},
            {q: "37. Tiempo total desde el disparo sinusal hasta que emerge en ventrículos:", a: ["0.16 segundos", "0.22 s", "0.09 s", "0.04 s"], c: "0.16 segundos", e: "0.03s (internodal) + 0.13s (AV total) = 0.16s."},
            {q: "38. ¿Por qué la electricidad viaja tan lento (0.03 m/s) en el Nodo AV?", a: ["Disminución drástica de uniones gap, aumentando resistencia iónica", "Hiper-mielinización", "Falta de líquido intracelular", "Exceso de calcio"], c: "Disminución drástica de uniones gap, aumentando resistencia iónica"},
            {q: "39. ¿Qué ocurriría si el nodo AV no retrasara la señal?", a: ["Vaciado ventricular ineficiente por contracción casi simultánea aurícula-ventrículo", "Gasto cardíaco doble", "Fibrilación auricular", "Nada"], c: "Vaciado ventricular ineficiente por contracción casi simultánea aurícula-ventrículo"},
            {q: "40. ¿En qué parte del ECG se mide clínicamente este retraso?", a: ["Intervalo P-R", "Segmento ST", "Ancho QRS", "Onda T"], c: "Intervalo P-R"},

            // 5. HAZ DE HIS Y SISTEMA DE PURKINJE
            {q: "41. Característica histológica de las Fibras de Purkinje:", a: ["Son las fibras musculares cardíacas más grandes del corazón", "Son células adiposas", "Son nervios somáticos", "Son del tamaño del nodo SA"], c: "Son las fibras musculares cardíacas más grandes del corazón"},
            {q: "42. Velocidad de conducción en las Fibras de Purkinje:", a: ["1.5 a 4.0 metros por segundo", "0.3 a 0.5 m/s", "100 m/s", "0.02 m/s"], c: "1.5 a 4.0 metros por segundo"},
            {q: "43. ¿Cómo logran las fibras de Purkinje esta transmisión tan rápida?", a: ["Altísima permeabilidad en uniones gap, flujo iónico casi sin resistencia", "Mielina gruesa", "Noradrenalina constante", "Conductancia magnética"], c: "Altísima permeabilidad en uniones gap, flujo iónico casi sin resistencia"},
            {q: "44. ¿Qué capacidad funcional casi NO poseen las fibras de Purkinje?", a: ["Contracción mecánica (tienen pocas miofibrillas)", "Conducción eléctrica", "Válvulas", "Eritropoyetina"], c: "Contracción mecánica (tienen pocas miofibrillas)"},

            {q: "46. La porción penetrante del Haz permite el paso del impulso de forma:", a: ["Unidireccional: De aurículas a ventrículos", "Bidireccional", "Aleatoria", "Ventrículo Izq a Der"], c: "Unidireccional: De aurículas a ventrículos"},
            {q: "47. Si existiera un puente muscular extra (Haz de Kent), ¿qué arritmia ocurriría?", a: ["Síndrome de Wolff-Parkinson-White", "Infarto masivo", "Estenosis aórtica", "Bloqueo 3er grado"], c: "Síndrome de Wolff-Parkinson-White"},
            {q: "48. Divisiones principales del Haz AV tras el tabique:", a: ["Rama izquierda y derecha del haz", "Ramas superior, media e inferior", "Bachmann y Thorel", "Aórtica y pulmonar"], c: "Rama izquierda y derecha del haz"},
            {q: "49. Las ramas del Haz corren hacia el vértice situadas debajo de:", a: ["El endocardio", "El epicardio", "Miocardio medio", "Pericardio visceral"], c: "El endocardio"},
            {q: "50. Tiempo del impulso desde ramas del haz hasta terminar en fibras de Purkinje apicales:", a: ["0.03 segundos", "0.16 s", "1.0 s", "0.13 s"], c: "0.03 segundos"},

            {q: "51. Velocidad del impulso por el músculo ventricular ordinario:", a: ["0.3 a 0.5 metros por segundo", "4 m/s", "100 m/s", "0.01 m/s"], c: "0.3 a 0.5 metros por segundo"},

        ];

        let cur = 0, points = 0, solved = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function load() {
            solved = false;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('fb').classList.add('hidden');
            const data = quizData[cur];
            
            // Limpieza automática de números del texto original
            document.getElementById('q-text').textContent = data.q.replace(/^[0-9]+\.\s*/, "");
            
            document.getElementById('idx').textContent = cur + 1;
            document.getElementById('total-count').textContent = quizData.length;
            document.getElementById('bar').style.width = ((cur + 1) / quizData.length * 100) + '%';
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            const shuffledOptions = shuffle([...data.a]);
            
            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-fade-in';
                btn.innerHTML = `<span class="w-10 h-10 rounded-full border-2 border-gray-100 flex items-center justify-center text-xs font-black mr-2 bg-gray-50">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => check(opt, btn, data.c, data.e);
                container.appendChild(btn);
            });
        }

        function check(selected, btn, correct, explanation) {
            if(solved) return;
            solved = true;
            const btns = document.querySelectorAll('.option-btn');
            
            if(selected === correct) {
                points++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                btns.forEach(b => { if(b.textContent.includes(correct)) b.classList.add('correct'); });
            }

            if(explanation) {
                const fb = document.getElementById('fb');
                fb.innerHTML = `<strong>ANÁLISIS GUYTON:</strong> ${explanation}`;
                fb.className = "mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 " + (selected===correct ? "bg-green-50 border-green-500 text-green-700" : "bg-red-50 border-red-500 text-red-700");
                fb.classList.remove('hidden');
            }

            btns.forEach(b => b.disabled = true);
            document.getElementById('next').classList.remove('hidden');
        }

        document.getElementById('next').onclick = () => {
            cur++;
            if(cur < quizData.length) {
                load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.getElementById('card').classList.add('hidden');
                document.getElementById('res').classList.remove('hidden');
                document.getElementById('score').textContent = Math.round((points/quizData.length)*100);
            }
        };

        window.onload = load;
    </script>
