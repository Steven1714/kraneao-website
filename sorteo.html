<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sorteo Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gold: #FFD700;
            --secondary-orange: #FF8C00;
            --bg-dark: #0a0a0a;
            --card-dark: #141414;
            --slot-bg: #1a1a1a;
            --success-green: #00c853;
            --special-blue: #2962ff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-dark);
            /* Fondo con un degradado radial sutil para dar profundidad */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Evitar scroll en el cel */
        }

        .container {
            background: rgba(20, 20, 20, 0.8);
            /* Efecto de "cristal esmerilado" sutil */
            backdrop-filter: blur(10px);
            padding: 30px 25px;
            border-radius: 24px;
            /* Sombras múltiples para un efecto 3D sofisticado */
            box-shadow:
                0 20px 40px rgba(0,0,0,0.6),
                inset 0 1px 1px rgba(255,255,255,0.1);
            width: 90%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.1); /* Borde dorado muy sutil */
        }

        h1 {
            margin: 0 0 5px 0;
            color: var(--primary-gold);
            text-transform: uppercase;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            /* Sombra de texto dorada para efecto neón */
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        p.subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .slot-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slot {
            background-color: var(--slot-bg);
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Borde izquierdo más grueso y brillante */
            border-left: 4px solid #333;
            /* Sombra interna para dar sensación de "hundido" */
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* Estado "Rodando" */
        .slot.rolling .name-text {
            color: #666;
            /* Efecto de desenfoque de movimiento ligero */
            filter: blur(0.8px);
            transform: scale(0.98);
            transition: color 0.1s, filter 0.1s;
        }

        /* Estado "Finalizado Genérico" */
        .slot.finished {
            background: linear-gradient(145deg, #1b5e20, #00c853);
            border-left-color: #69f0ae;
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0, 200, 83, 0.3);
            z-index: 2;
        }

        /* Estado "Finalizado Especial (Estefany)" */
        .slot.special-highlight.finished {
            background: linear-gradient(145deg, #0d47a1, #2962ff);
            border-left-color: #82b1ff;
            box-shadow: 0 5px 15px rgba(41, 98, 255, 0.4);
        }

        /* Efecto de resplandor en el texto ganador */
        .slot.finished .name-text {
            text-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .position-number {
            font-family: 'Roboto Mono', monospace; /* Fuente monoespaciada técnica */
            color: #555;
            font-size: 0.85em;
            margin-right: 15px;
            opacity: 0.7;
        }

        .slot.finished .position-number {
            color: rgba(255,255,255,0.6);
        }

        button {
            margin-top: 30px;
            padding: 18px 50px;
            font-size: 18px;
            font-family: 'Montserrat', sans-serif;
            /* Degradado dorado metálico */
            background: linear-gradient(to bottom, var(--primary-gold), var(--secondary-orange));
            border: none;
            border-radius: 50px;
            color: #1a1a1a;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            /* Sombra 3D fuerte */
            box-shadow:
                0 6px 0 #b86600, /* Borde 3D inferior */
                0 15px 20px rgba(255, 143, 0, 0.3);
            transition: all 0.1s ease;
            text-transform: uppercase;
            position: relative;
            top: 0;
        }

        button:active {
            /* Efecto de presionar el botón 3D */
            top: 4px;
            box-shadow:
                0 2px 0 #b86600,
                0 5px 10px rgba(255, 143, 0, 0.2);
        }

        button:disabled {
            background: #333;
            color: #555;
            box-shadow: none;
            top: 4px;
            cursor: not-allowed;
        }

        /* Pequeño destello en el botón */
        button::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(rgba(255,255,255,0.4), transparent);
            border-radius: 50px 50px 0 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Sorteador</h1>
    <p class="subtitle">Posiciones</p>

    <div class="slot-container" id="slotContainer">
        </div>
    <button id="btnSortear" onclick="iniciarSorteo()">Iniciar Sorteo</button>
</div>

<script>
    // --- CONFIGURACIÓN DEL TRUCO (VERSIÓN 2 - LÓGICA INTACTA) ---

    // Puesto 2 FIJO (El público cree que es suerte)
    const nombrePuesto2 = "Estefany";

    // Grupo de sorteo REAL (Se pelean del 3 al 8)
    const grupoSorteo = ["Daniel", "Tato", "Amarilis", "Ricardo", "Celeida", "Daniel"];

    // Lista completa solo para la animación visual (ruido visual)
    const todosLosNombres = [nombrePuesto2, ...grupoSorteo];

    // ------------------------------------------

    const container = document.getElementById('slotContainer');
    const btn = document.getElementById('btnSortear');
    let slots = [];

    // Generar visualmente los huecos necesarios (Del #2 en adelante)
    const totalSlots = 1 + grupoSorteo.length; // Estefany + grupo
    for (let i = 0; i < totalSlots; i++) {
        let div = document.createElement('div');
        div.className = 'slot';
        // Usamos una clase específica para el nombre para aplicarle efectos
        div.innerHTML = `<span class="position-number">#${i+2}</span> <span class="name-text">---</span>`;
        container.appendChild(div);
        slots.push(div);
    }

    function iniciarSorteo() {
        btn.disabled = true;
        btn.innerText = "Sorteando..."; // Feedback visual en el botón

        // 1. LÓGICA (BACKEND)
        let aleatorios = [...grupoSorteo];
        for (let i = aleatorios.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [aleatorios[i], aleatorios[j]] = [aleatorios[j], aleatorios[i]];
        }

        // El orden final empieza con Estefany, seguido de los aleatorios
        const ordenFinal = [nombrePuesto2, ...aleatorios];

        // 2. ANIMACIÓN (FRONTEND)
        let intervalIds = [];

        // Poner a girar todos
        slots.forEach((slot, index) => {
            slot.classList.remove('finished', 'special-highlight');
            slot.classList.add('rolling');

            // Velocidad de giro un poco más rápida para efecto "blur"
            let interval = setInterval(() => {
                const nombreAleatorio = todosLosNombres[Math.floor(Math.random() * todosLosNombres.length)];
                slot.querySelector('.name-text').innerText = nombreAleatorio;
            }, 40 + (index * 5));

            intervalIds.push(interval);
        });

        // 3. PARADA EN CASCADA
        ordenFinal.forEach((nombreGanador, index) => {
            // Tiempos de parada un poco más largos para más drama
            const tiempoParada = 1200 + (index * 1000);

            setTimeout(() => {
                clearInterval(intervalIds[index]); // Frenar
                let slot = slots[index];

                // Asignar nombre final
                slot.querySelector('.name-text').innerText = nombreGanador;

                // Estilos finales
                slot.classList.remove('rolling');
                slot.classList.add('finished');

                // El puesto 2 (índice 0) recibe el color azul especial
                if(index === 0) {
                    slot.classList.add('special-highlight');
                }

                if(index === ordenFinal.length - 1) {
                    btn.innerText = "Sorteo Finalizado";
                    // btn.disabled = false; // Descomentar si quieres permitir otro sorteo
                }

            }, tiempoParada);
        });
    }
</script>

</body>
</html>
