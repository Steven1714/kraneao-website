    <script>
        const quizData = [
            // BLOQUE 1: HEMODINÁMICA
            {q: "1. Según la Ley de Ohm aplicada a la hemodinámica, el Flujo Sanguíneo (Q) a través de un vaso es directamente proporcional a:", a: ["La diferencia de presión ($\Delta P$) entre los dos extremos", "La resistencia vascular periférica (R)", "La viscosidad de la sangre", "La longitud del vaso sanguíneo"], c: "La diferencia de presión ($\Delta P$) entre los dos extremos", e: "A mayor gradiente de presión, mayor flujo."},

            {q: "4. En el flujo laminar, ¿cuál es la característica de la velocidad de la sangre dentro del vaso?", a: ["La sangre en el centro viaja mucho más rápido (perfil parabólico)", "Toda viaja exactamente a la misma velocidad", "La sangre en las paredes viaja más rápido", "La sangre cambia de dirección constantemente"], c: "La sangre en el centro viaja mucho más rápido (perfil parabólico)"},
            {q: "5. Cuando la sangre fluye en todas direcciones, formando espirales y torbellinos (soplos), el flujo se denomina:", a: ["Flujo Turbulento", "Flujo Laminar", "Flujo Diastólico", "Flujo Osmótico"], c: "Flujo Turbulento"},
            {q: "6. La tendencia a que se produzca un flujo turbulento se calcula matemáticamente mediante:", a: ["El Número de Reynolds", "La Constante de Poiseuille", "La Ecuación de Nernst", "La Ley de Frank-Starling"], c: "El Número de Reynolds"},

            {q: "8. En un sistema vascular normal, ¿cuál es el valor aproximado de la Resistencia Periférica Total (RPT)?", a: ["1 PRU (Unidad de Resistencia Periférica)", "100 PRU", "0.1 PRU", "10 PRU"], c: "1 PRU (Unidad de Resistencia Periférica)"},

            {q: "12. Si el diámetro de una arteriola se DUPLICA, ¿qué ocurre con el flujo de sangre?", a: ["El flujo aumenta 16 veces ($2^4$)", "El flujo aumenta 2 veces", "El flujo aumenta 4 veces", "El flujo aumenta 8 veces"], c: "El flujo aumenta 16 veces ($2^4$)"},

            {q: "19. Beneficio hemodinámico de la disposición en PARALELO de los órganos:", a: ["Reduce la resistencia total y permite autorregulación individual", "Aumenta la resistencia", "Obliga flujo secuencial", "Evita capilares linfáticos"], c: "Reduce la resistencia total y permite autorregulación individual"},
            {q: "20. Si se extirpa un riñón (eliminando un circuito en paralelo), la RPT general:", a: ["Aumentará", "Disminuirá drásticamente", "Se mantendrá igual", "Caerá a 0"], c: "Aumentará"},

            // BLOQUE 2: DISTENSIBILIDAD

            {q: "29. En Arteriosclerosis (arterias rígidas), ¿qué ocurre con la Presión de Pulso?", a: ["Aumenta severamente por falta de amortiguación", "Disminuye a 10 mmHg", "Normal", "Baja la sistólica"], c: "Aumenta severamente por falta de amortiguación"},
            {q: "30. En Estenosis Aórtica, la Presión de Pulso estará:", a: ["Disminuida (pulso débil y filiforme)", "Muy aumentada", "Normal", "Invertida"], c: "Disminuida (pulso débil y filiforme)"},
            {q: "31. En Insuficiencia Aórtica, la Presión de Pulso estará:", a: ["Muy aumentada (pulso saltón)", "Muy disminuida", "Normal", "Fija"], c: "Muy aumentada (pulso saltón)"},
            {q: "32. Fenómeno que convierte el flujo pulsátil intermitente en flujo continuo capilar:", a: ["Efecto Windkessel", "Cierre venoso", "Ventrículo derecho", "Células de Schwann"], c: "Efecto Windkessel"},
            {q: "33. Cálculo más exacto de la Presión Arterial Media (PAM):", a: ["Diastólica + 1/3 de la Presión de Pulso", "(Sistólica + Diastólica) / 2", "Sistólica - Diastólica", "PVC x Resistencia"], c: "Diastólica + 1/3 de la Presión de Pulso", e: "Esto es porque la diástole dura más tiempo que la sístole."},
            {q: "34. ¿A qué velocidad viaja la ONDA del pulso arterial en la aorta?", a: ["3 a 5 metros por segundo", "1 cm/min", "100 m/s", "0.05 m/s"], c: "3 a 5 metros por segundo"},

            // BLOQUE 3: VENAS Y PVC
            {q: "35. Clínicamente, la presión en la Aurícula Derecha se conoce como:", a: ["Presión Venosa Central (PVC)", "Presión en Cuña", "Presión Media de Llenado", "Presión Oncótica"], c: "Presión Venosa Central (PVC)"},

            {q: "38. Efecto de la inspiración normal en el retorno venoso:", a: ["Presión torácica negativa que succiona la sangre al corazón", "Comprime venas", "Vacía abdomen", "Sin efecto"], c: "Presión torácica negativa que succiona la sangre al corazón"},

            {q: "77. Mecanismo que propulsa la linfa contra gravedad:", a: ["Bomba Linfática (contracción intrínseca y muscular)", "Presión negativa pulmón", "Gravedad invertida", "Latido derecho"], c: "Bomba Linfática (contracción intrínseca y muscular)"},
            {q: "78. Bloqueo linfático por parásitos Nemátodos causa:", a: ["Elefantiasis", "Edema agudo pulmón", "Várices", "Duchenne"], c: "Elefantiasis"},
            {q: "79. Ascitis por desnutrición (Kwashiorkor) se debe a:", a: ["Caída de Presión Oncótica por falta de Albúmina", "PA de 200 mmHg", "Fallo renal", "Falta de hierro"], c: "Caída de Presión Oncótica por falta de Albúmina"},
            {q: "80. Trombosis venosa en pierna causa edema por:", a: ["Aumento agudo de Presión Hidrostática Capilar", "Baja oncótica", "Bloqueo linfa", "Aumento flujo linfa"], c: "Aumento agudo de Presión Hidrostática Capilar"},

            // BLOQUE 7: REGULACIÓN LOCAL
            {q: "81. El flujo sanguíneo de un músculo en ejercicio:", a: ["Aumenta proporcionalmente a su metabolismo", "Disminuye para el cerebro", "Permanece igual", "Sube solo en piel"], c: "Aumenta proporcionalmente a su metabolismo"},
            {q: "82. Vasodilatador local coronario más importante (subproducto de ATP):", a: ["Adenosina", "Calcio", "Tiroxina", "von Willebrand"], c: "Adenosina"},

            {q: "93. Efecto de la 'Noradrenalina' liberada en el terror (Receptores Alfa-1):", a: ["Vasoconstricción extrema generalizada", "Vasodilatación piel", "Paro cardíaco", "Relajación anal"], c: "Vasoconstricción extrema generalizada"},
            {q: "94. Principal efecto hemodinámico inmediato de la Angiotensina II:", a: ["Potente vasoconstricción arteriolar", "Bradicardia vagal", "Hemólisis", "Factor XII"], c: "Potente vasoconstricción arteriolar"},
            {q: "95. Papel de la Vasopresina (ADH) tras hemorragia masiva:", a: ["Vasoconstrictor salvaje y retención de agua renal", "Dilatar venas", "Bajar PA a cero", "Coagulación"], c: "Vasoconstrictor salvaje y retención de agua renal"},
            {q: "96. Cinina inflamatoria causante de rubor, edema y dolor:", a: ["Bradicinina", "Angiotensina I", "Miosina cinasa", "Aldosterona"], c: "Bradicinina"},
            {q: "97. Única estructura de microcirculación que permite intercambio líquido real:", a: ["Capilar verdadero (y vénula poscapilar)", "Aorta", "Subclavia", "Arteriola muscular"], c: "Capilar verdadero (y vénula poscapilar)"},
            {q: "98. Consecuencia microcirculatoria cerebral de subida de $CO_2$ o $H^+$:", a: ["Dilatación brusca y masiva de vasos cerebrales", "Isquemia letal", "Hidrocefalia", "Ningún efecto"], c: "Dilatación brusca y masiva de vasos cerebrales"},
            {q: "99. Presión de perfusión en arterias pulmonares (Ventrículo derecho):", a: ["25/8 mmHg (sistema de baja presión)", "120/80 mmHg", "200/100 mmHg", "0 mmHg"], c: "25/8 mmHg (sistema de baja presión)"},
            {q: "100. Objetivo principal de la hemodinámica según Guyton:", a: ["Sintonizar el flujo individual para la demanda exacta de cada célula", "Mantener PA en 150", "Alimentar solo al cerebro", "Evitar bombeo cardíaco"], c: "Sintonizar el flujo individual para la demanda exacta de cada célula"}
        ];

        let cur = 0, points = 0, solved = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Función para renderizar matemáticas de forma segura
        function safeRenderMath(element) {
            if (typeof renderMathInElement === 'function') {
                try {
                    renderMathInElement(element, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ],
                        throwOnError: false
                    });
                } catch (e) {
                    console.warn("KaTeX render failed", e);
                }
            }
        }

        function load() {
            solved = false;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('fb').classList.add('hidden');
            const data = quizData[cur];
            
            // LIMPIEZA DINÁMICA: Borramos números y BLOQUES del texto original
            document.getElementById('q-text').textContent = data.q.replace(/^[0-9]+\.\s*/, "");
            
            document.getElementById('idx').textContent = cur + 1;
            document.getElementById('total-count').textContent = quizData.length;
            document.getElementById('bar').style.width = ((cur + 1) / quizData.length * 100) + '%';
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            const shuffledOptions = shuffle([...data.a]);
            
            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-fade-in';
                btn.innerHTML = `<span class="w-10 h-10 rounded-full border-2 border-gray-100 flex items-center justify-center text-xs font-black mr-2 bg-gray-50 text-gray-400">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => check(opt, btn, data.c, data.e);
                container.appendChild(btn);
            });

            // Re-renderizar matemáticas en la pregunta y opciones
            safeRenderMath(document.getElementById('quiz-container'));
        }

        function check(selected, btn, correct, explanation) {
            if(solved) return;
            solved = true;
            const btns = document.querySelectorAll('.option-btn');
            
            if(selected === correct) {
                points++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                btns.forEach(b => { if(b.textContent.includes(correct)) b.classList.add('correct'); });
            }

            if(explanation) {
                const fb = document.getElementById('fb');
                fb.innerHTML = `<strong>ANÁLISIS GUYTON:</strong> ${explanation}`;
                fb.className = "mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 " + (selected===correct ? "bg-green-50 border-green-500 text-green-700" : "bg-red-50 border-red-500 text-red-700");
                fb.classList.remove('hidden');
                safeRenderMath(fb);
            }

            btns.forEach(b => b.disabled = true);
            document.getElementById('next').classList.remove('hidden');
        }

        document.getElementById('next').onclick = () => {
            cur++;
            if(cur < quizData.length) {
                load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.getElementById('card').classList.add('hidden');
                document.getElementById('res').classList.remove('hidden');
                document.getElementById('score').textContent = Math.round((points/quizData.length)*100);
            }
        };

        // Esperar a que todo cargue antes de iniciar
        window.addEventListener('load', () => {
            load();
        });
    </script>
