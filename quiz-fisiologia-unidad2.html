        let cur = 0, points = 0, solved = false;

        // ALGORITMO DE MEZCLA (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function load() {
            solved = false;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('fb').classList.add('hidden');
            const data = shuffledData[cur];
            document.getElementById('q-text').textContent = data.q.replace(/^\d+\.\s*/, '');
            document.getElementById('idx').textContent = cur + 1;
            document.getElementById('total_qs').textContent = shuffledData.length;
            document.getElementById('bar').style.width = ((cur + 1) / shuffledData.length * 100) + '%';

            const container = document.getElementById('opts');
            container.innerHTML = '';

            // LÓGICA DE MEZCLA: Las opciones se desordenan antes de mostrarse
            const shuffledOptions = shuffle([...data.a]);

            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-fade-in';
                btn.innerHTML = `<span class="w-8 h-8 rounded-full border-2 border-gray-100 flex items-center justify-center text-[10px] font-black mr-2">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => check(opt, btn, data.c, data.e);
                container.appendChild(btn);
            });
        }

        function check(selected, btn, correct, explanation) {
            if(solved) return;
            solved = true;
            const btns = document.querySelectorAll('.option-btn');

            if(selected === correct) {
                points++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                // Revelar la correcta para fomentar el aprendizaje
                btns.forEach(b => {
                    if(b.textContent.includes(correct)) b.classList.add('correct');
                });
            }

            if(explanation) {
                const fb = document.getElementById('fb');
                fb.innerHTML = `<strong>ANÁLISIS MÉDICO:</strong> ${explanation}`;
                fb.className = "mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 " + (selected===correct ? "bg-green-50 border-green-500 text-green-700" : "bg-red-50 border-red-500 text-red-700");
                fb.classList.remove('hidden');
            }

            btns.forEach(b => b.disabled = true);
            document.getElementById('next').classList.remove('hidden');
        }

        document.getElementById('next').onclick = () => {
            cur++;
            if(cur < shuffledData.length) {
                load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('card').classList.add('hidden');
            document.getElementById('res').classList.remove('hidden');
            document.getElementById('score').textContent = Math.round((points/shuffledData.length)*100);
        }

        window.onload = () => {
            shuffledData = shuffle([...quizData]);
            load();
        };
