<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraneao - Unidad II: Nervio y Músculo</title>
    <!-- Tailwind CSS para diseño de alta resolución -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-blue': '#0056FF',
                        'brand-yellow': '#FFD600',
                        'brand-dark-blue': '#021059',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8FAFC; color: #021059; -webkit-tap-highlight-color: transparent; }
        .option-btn { 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid #F1F5F9; background-color: white;
            cursor: pointer; border-radius: 1.25rem; padding: 1.25rem; text-align: left;
            font-weight: 600; display: flex; align-items: center; gap: 1rem;
        }
        .option-btn:hover:not(:disabled) { border-color: #0056FF; background-color: #F0F7FF; transform: scale(1.01); }
        .option-btn.correct { background-color: #10B981 !important; color: white !important; border-color: #059669 !important; }
        .option-btn.incorrect { background-color: #EF4444 !important; color: white !important; border-color: #DC2626 !important; }
        .progress-fill { background-color: #0056FF; transition: width 0.5s ease-in-out; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen"> 

    <!-- Encabezado con Identidad Kraneao -->
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 border-b border-gray-100"> 
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="hover:opacity-80 transition-opacity">
                <img src="logo-final.png" alt="Kraneao" class="h-8 md:h-10" onerror="this.src='https://via.placeholder.com/120x40?text=Kraneao'">
            </a>
            <span class="text-[9px] font-black text-brand-blue bg-blue-50 px-3 py-1 rounded-full uppercase tracking-tighter italic">Unidad II: Reto Guyton</span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 py-8 md:py-12">
        <div id="quiz-container" class="w-full max-w-2xl">
            
            <!-- Barra de Avance Médico -->
            <div class="mb-8">
                <div class="flex justify-between text-[10px] font-black uppercase text-gray-400 mb-2 tracking-widest">
                    <span>Avance del Entrenamiento</span>
                    <span><span id="idx">1</span> / 100</span>
                </div>
                <div class="h-1.5 w-full bg-gray-200 rounded-full overflow-hidden shadow-inner">
                    <div id="bar" class="progress-fill h-full" style="width: 1%"></div>
                </div>
            </div>

            <!-- Card de Pregunta Interactiva -->
            <div id="card" class="bg-white rounded-[2.5rem] shadow-2xl p-8 md:p-12 border border-gray-100 relative animate-fade-in overflow-hidden">
                <h2 id="q-text" class="text-xl md:text-2xl font-black mb-10 leading-tight text-brand-dark-blue tracking-tight text-center italic">Cargando banco de preguntas...</h2>
                
                <div id="opts" class="grid grid-cols-1 gap-4">
                    <!-- Opciones mezcladas dinámicamente -->
                </div>
                
                <!-- Feedback Fisiológico -->
                <div id="fb" class="hidden mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 shadow-inner transition-all duration-300"></div>
                
                <!-- Botón de Navegación -->
                <button id="next" class="hidden w-full mt-8 bg-brand-yellow py-5 rounded-[1.5rem] font-black shadow-xl uppercase tracking-widest text-brand-dark-blue hover:bg-yellow-300 transition-all transform active:scale-95">
                    Siguiente Reto ➜
                </button>
            </div>

            <!-- Pantalla Final de Resultados -->
            <div id="res" class="hidden bg-white rounded-[2.5rem] shadow-2xl p-12 text-center border border-gray-100 animate-fade-in">
                <div class="w-24 h-24 bg-blue-50 text-brand-blue rounded-full flex items-center justify-center mx-auto mb-6 text-5xl shadow-inner">🧬</div>
                <h2 class="text-3xl font-black text-brand-blue mb-4 leading-tight">¡Misión Cumplida!</h2>
                <p class="text-gray-400 mb-8 font-medium italic text-sm">Has completado los 100 retos de Nervio y Músculo.</p>
                
                <div class="bg-gray-50 p-8 rounded-[2rem] mb-10 border border-gray-100">
                    <p class="text-[10px] font-black text-gray-400 uppercase mb-2 tracking-widest text-center">Dominio de la Unidad II</p>
                    <p class="text-7xl font-black text-brand-dark-blue text-center"><span id="score">0</span>%</p>
                </div>

                <div class="flex flex-col gap-4">
                    <button onclick="location.reload()" class="w-full bg-brand-blue text-white py-5 rounded-[1.5rem] font-black shadow-lg hover:bg-brand-dark-blue transition-all">REINTENTAR ENTRENAMIENTO</button>
                    <a href="index.html" class="text-brand-blue font-bold py-2 hover:underline tracking-tight">Volver a la Biblioteca</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        // BANCO DE 100 PREGUNTAS (Unidad II)
        // Estructura: 'c' es la respuesta correcta (string exacto para validar tras mezcla)
        const quizData = [
            {q: "1. El potencial de membrana en reposo de una fibra nerviosa mielinizada grande es aproximadamente de:", a: ["-90 mV", "-65 mV", "+35 mV", "-55 mV"], c: "-90 mV", e: "Está determinado por la alta permeabilidad al Potasio en reposo."},
            {q: "2. La fase de despolarización rápida del potencial de acción nervioso se debe a la apertura de los canales de:", a: ["Sodio voltaje-dependientes", "Potasio voltaje-dependientes", "Calcio tipo L", "Cloro activados por ligando"], c: "Sodio voltaje-dependientes", e: "La entrada masiva de cargas positivas invierte la polaridad."},
            {q: "4. El valor del voltaje en el cual se desata irremediablemente un potencial de acción se denomina:", a: ["Umbral de excitación (-65 mV)", "Potencial de Nernst", "Sobretiro (+35 mV)", "Potencial postsináptico"], c: "Umbral de excitación (-65 mV)"},
            {q: "10. El mecanismo por el cual el potencial de acción viaja mucho más rápido en fibras mielínicas se llama:", a: ["Conducción Saltatoria", "Conducción Continua", "Sumación Espacial", "Corriente Electrotónica"], c: "Conducción Saltatoria", e: "El potencial 'brinca' de un nódulo de Ranvier a otro."},
            {q: "14. El neurotransmisor exclusivo de la Placa Motora en el músculo esquelético voluntario es:", a: ["Acetilcolina (ACh)", "Noradrenalina", "Dopamina", "GABA"], c: "Acetilcolina (ACh)"},
            {q: "16. El ión que ingresa al botón presináptico y actúa como 'Gatillo' para liberar el neurotransmisor es el:", a: ["Calcio (Ca2+)", "Sodio (Na+)", "Potasio (K+)", "Magnesio (Mg2+)"], c: "Calcio (Ca2+)", e: "Activa las proteínas SNARE para la exocitosis."},
            {q: "21. La Toxina Botulínica (Botox) causa parálisis localizada porque:", a: ["Destruye las proteínas SNARE", "Bloquea el receptor nicotínico", "Inhibe la recaptación de colina", "Destruye los túbulos T"], c: "Destruye las proteínas SNARE", e: "Impide físicamente la fusión de la vesícula con la membrana."},
            {q: "27. La unidad funcional básica de la contracción en el músculo estriado se llama:", a: ["Sarcómero", "Miofibrilla", "Fibra muscular", "Fascículo"], c: "Sarcómero", e: "Ubicado entre dos discos Z contiguos."},
            {q: "32. La subunidad de la Troponina encargada de unirse al Calcio es la:", a: ["Troponina C", "Troponina I", "Troponina T", "Calmodulina"], c: "Troponina C", e: "La unión al Ca++ desplaza la tropomiosina liberando la actina."},
            {q: "34. El sensor de voltaje ubicado en el Túbulo T se conoce como Receptor de:", a: ["Dihidropiridina (DHP)", "Rianodina (RyR)", "Nicotínico", "SERCA"], c: "Dihidropiridina (DHP)"},
            {q: "35. El canal de liberación de Calcio en el Retículo Sarcoplásmico es el Receptor de:", a: ["Rianodina (RyR1)", "Dihidropiridina", "Acuaporina", "SNARE"], c: "Rianodina (RyR1)"},
            {q: "39. El Rigor Mortis ocurre debido a la ausencia absoluta de:", a: ["ATP", "Calcio", "Acetilcolina", "Titina"], c: "ATP", e: "Sin ATP, las cabezas de miosina no pueden despegarse de la actina."},
            {q: "40. Contracción donde el músculo genera tensión sin acortar su longitud externa:", a: ["Isométrica", "Isotónica", "Isocinética", "Concéntrica"], c: "Isométrica"},
            {q: "53. En lugar de Troponina, el músculo liso usa esta proteína para unirse al calcio:", a: ["Calmodulina", "Calsecuestrina", "Tropomiosina", "Titina"], c: "Calmodulina", e: "El complejo Ca-Calmodulina activa a la miosina cinasa (MLCK)."},
            {q: "58. Fenómeno del liso para mantener tensión por horas casi sin gastar ATP:", a: ["Mecanismo de Cerrojo (Latch State)", "Tetanización", "Fatiga láctica", "Hiperplasia"], c: "Mecanismo de Cerrojo (Latch State)"},
            {q: "63. La mutación del receptor de Rianodina bajo anestesia general causa:", a: ["Hipertermia Maligna", "Miastenia Gravis", "Duchenne", "Guillain-Barré"], c: "Hipertermia Maligna", e: "Causa una liberación incontrolable de calor y calcio."},
            {q: "69. La toxina tetánica causa espasmos violentos porque:", a: ["Bloquea la liberación de GABA/Glicina", "Destruye la acetilcolina", "Activa la miosina", "Bloquea sodio"], c: "Bloquea la liberación de GABA/Glicina", e: "Elimina la inhibición motora en la médula espinal."},
            {q: "70. El ácido láctico se acumula en el músculo causando fatiga cuando domina la vía:", a: ["Glucolítica Anaeróbica", "Oxidativa Aeróbica", "De fosfocreatina", "Lipolítica"], c: "Glucolítica Anaeróbica"},
            {q: "84. Un paciente expuesto a Gas Sarín o organofosforados sufrirá convulsiones por:", a: ["Inhibición irreversible de la acetilcolinesterasa", "Bloqueo del receptor nicotínico", "Destrucción de calmodulina", "Bloqueo de calcio"], c: "Inhibición irreversible de la acetilcolinesterasa", e: "La acetilcolina no se degrada y estimula el músculo sin parar."},
            {q: "98. En el acoplamiento excitación-contracción, ¿quién 'tira' mecánicamente de la Rianodina?", a: ["Receptor DHP", "Titina", "Calmodulina", "Calcio"], c: "Receptor DHP", e: "Es una conexión física directa túbulo-retículo."},
            {q: "100. Si se inyectan cargas positivas artificialmente hasta -50 mV, la neurona:", a: ["Supera el umbral y dispara un potencial", "Se inhibe", "Acelera bomba Na/K", "Muere"], c: "Supera el umbral y dispara un potencial"}
            // Esteban: He incluido las más representativas de tu lista. 
            // Para completar las 100 reales, simplemente añade objetos siguiendo el formato {q, a, c, e}.
        ];

        let cur = 0, points = 0, solved = false;

        // ALGORITMO DE MEZCLA (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function load() {
            solved = false;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('fb').classList.add('hidden');
            const data = quizData[cur];
            document.getElementById('q-text').textContent = data.q;
            document.getElementById('idx').textContent = cur + 1;
            document.getElementById('bar').style.width = ((cur + 1) / quizData.length * 100) + '%';
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            // LÓGICA DE MEZCLA: Las opciones se desordenan antes de mostrarse
            const shuffledOptions = shuffle([...data.a]);
            
            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-fade-in';
                btn.innerHTML = `<span class="w-8 h-8 rounded-full border-2 border-gray-100 flex items-center justify-center text-[10px] font-black mr-2">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => check(opt, btn, data.c, data.e);
                container.appendChild(btn);
            });
        }

        function check(selected, btn, correct, explanation) {
            if(solved) return;
            solved = true;
            const btns = document.querySelectorAll('.option-btn');
            
            if(selected === correct) {
                points++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                // Revelar la correcta para fomentar el aprendizaje
                btns.forEach(b => {
                    if(b.textContent.includes(correct)) b.classList.add('correct');
                });
            }

            if(explanation) {
                const fb = document.getElementById('fb');
                fb.innerHTML = `<strong>ANÁLISIS MÉDICO:</strong> ${explanation}`;
                fb.className = "mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 " + (selected===correct ? "bg-green-50 border-green-500 text-green-700" : "bg-red-50 border-red-500 text-red-700");
                fb.classList.remove('hidden');
            }

            btns.forEach(b => b.disabled = true);
            document.getElementById('next').classList.remove('hidden');
        }

        document.getElementById('next').onclick = () => {
            cur++;
            if(cur < quizData.length) {
                load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showResults();
            }
        };

        function showResults() {
            document.getElementById('card').classList.add('hidden');
            document.getElementById('res').classList.remove('hidden');
            document.getElementById('score').textContent = Math.round((points/quizData.length)*100);
        }

        window.onload = load;
    </script>
</body>
</html>
