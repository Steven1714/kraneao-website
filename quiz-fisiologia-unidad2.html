    <script>
        const quizData = [
            {q: "1. El potencial de membrana en reposo de una fibra nerviosa mielinizada grande es aproximadamente de:", a: ["-90 mV", "-65 mV", "+35 mV", "-55 mV"], c: "-90 mV", e: "Está determinado por el potencial de Nernst del Potasio ($K^+$)."},

            {q: "7. Las células encargadas de producir la vaina de mielina en el Sistema Nervioso Periférico (SNP) son:", a: ["Células de Schwann", "Oligodendrocitos", "Astrocitos", "Microglía"], c: "Células de Schwann"},

            {q: "9. Los espacios desprovistos de mielina a lo largo del axón se denominan:", a: ["Nódulos de Ranvier", "Hendiduras sinápticas", "Conos axónicos", "Discos intercalares"], c: "Nódulos de Ranvier"},
            {q: "10. El mecanismo por el cual el potencial viaja mucho más rápido en fibras mielínicas se llama:", a: ["Conducción Saltatoria", "Conducción Continua", "Sumación Espacial", "Corriente Electrotónica"], c: "Conducción Saltatoria"},

            {q: "33. Proteína elástica que ancla la Miosina al Disco Z:", a: ["Titina", "Nebulina", "Distrofina", "Calsecuestrina"], c: "Titina"},

            {q: "35. Canal de liberación de Calcio en el Retículo Sarcoplásmico:", a: ["Receptor de Rianodina (RyR1)", "Receptor DHP", "Acuaporina", "SNARE"], c: "Receptor de Rianodina (RyR1)"},

            {q: "37. El Calcio regresa al retículo para la relajación mediante la:", a: ["Bomba SERCA", "Bomba Na/K ATPasa", "Intercambiador Na/Ca", "Bomba de protones"], c: "Bomba SERCA"},
            {q: "38. Físicamente, el 'Golpe de Fuerza' ocurre por:", a: ["La liberación de Pi y ADP de la cabeza de Miosina", "La unión de un nuevo ATP", "La hidrólisis directa del ATP", "La unión del Calcio"], c: "La liberación de Pi y ADP de la cabeza de Miosina"},
            {q: "39. El Rigor Mortis ocurre debido a la ausencia absoluta de:", a: ["ATP", "Iones de Calcio", "Acetilcolina", "Titina"], c: "ATP"},

            {q: "79. ¿Por qué los canales nicotínicos no dejan pasar Cloro?", a: ["El poro tiene cargas negativas que los repelen", "Son muy grandes", "No hay Cloro fuera", "El calcio lo impide"], c: "El poro tiene cargas negativas que los repelen"},
            {q: "80. Si una neurona está a -100 mV, está en estado de:", a: ["Inhibición", "Excitación", "Tetanización", "Espiga"], c: "Inhibición"},
            {q: "81. Ion que antagoniza al Calcio disminuyendo liberación de ACh:", a: ["Magnesio ($Mg^{2+}$)", "Cloruro", "Potasio", "Fosfato"], c: "Magnesio ($Mg^{2+}$)"},
            {q: "82. Una unidad motora es:", a: ["Una motoneurona y todas las fibras que inerva", "Un nervio y un fascículo", "Un sarcómero", "Cerebro y Médula"], c: "Una motoneurona y todas las fibras que inerva"},

            {q: "92. Estructura que envuelve a un solo fascículo muscular:", a: ["Perimisio", "Endomisio", "Epimisio", "Sarcolema"], c: "Perimisio"},

            {q: "96. Célula lisa unitaria pasa estímulo a vecinas por:", a: ["Uniones Gap", "Varicosidades", "Mielina", "Relajación"], c: "Uniones Gap"},
            {q: "97. Receptor muscarínico M2 (Nervio Vago) produce:", a: ["Bradicardia", "Taquicardia", "Más fuerza", "Paro en sístole"], c: "Bradicardia"},
            {q: "98. ¿Quién 'tira' de la Rianodina físicamente?", a: ["El receptor DHP", "La Titina", "La Calmodulina", "El Calcio"], c: "El receptor DHP"},
            {q: "99. En Esclerosis Múltiple, la corriente eléctrica:", a: ["Se fuga o se bloquea", "Viaja más rápido", "Se hace química", "Hipertrofia el nervio"], c: "Se fuga o se bloquea"},
            {q: "100. Inyectar cargas positivas hasta -50 mV provoca:", a: ["Disparo de potencial explosivo", "Inhibición", "Acelera bomba", "Nada"], c: "Disparo de potencial explosivo"}
        ];

        let cur = 0, points = 0, solved = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function load() {
            solved = false;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('fb').classList.add('hidden');
            const data = quizData[cur];
            document.getElementById('q-text').textContent = data.q.replace(/^[0-9]+\.\s*/, "");
            document.getElementById('idx').textContent = cur + 1;
            document.getElementById('total-count').textContent = quizData.length;
            document.getElementById('bar').style.width = ((cur + 1) / quizData.length * 100) + '%';
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            const shuffledOptions = shuffle([...data.a]);
            
            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-fade-in';
                btn.innerHTML = `<span class="w-8 h-8 rounded-full border-2 border-gray-100 flex items-center justify-center text-[10px] font-black mr-2">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => check(opt, btn, data.c, data.e);
                container.appendChild(btn);
            });
        }

        function check(selected, btn, correct, explanation) {
            if(solved) return;
            solved = true;
            const btns = document.querySelectorAll('.option-btn');
            
            if(selected === correct) {
                points++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                btns.forEach(b => {
                    if(b.textContent.includes(correct)) b.classList.add('correct');
                });
            }

            if(explanation) {
                const fb = document.getElementById('fb');
                fb.innerHTML = `<strong>ANÁLISIS:</strong> ${explanation}`;
                fb.className = "mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 " + (selected===correct ? "bg-green-50 border-green-500 text-green-700" : "bg-red-50 border-red-500 text-red-700");
                fb.classList.remove('hidden');
            }

            btns.forEach(b => b.disabled = true);
            document.getElementById('next').classList.remove('hidden');
        }

        document.getElementById('next').onclick = () => {
            cur++;
            if(cur < quizData.length) {
                load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.getElementById('card').classList.add('hidden');
                document.getElementById('res').classList.remove('hidden');
                document.getElementById('score').textContent = Math.round((points/quizData.length)*100);
            }
        };

        window.onload = load;
    </script>
</body>
