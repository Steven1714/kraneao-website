<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kraneao - Medicina Interactiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        'brand-blue': '#0056FF',
                        'brand-yellow': '#FFD600',
                        'brand-dark-blue': '#021059',
                    },
                    animation: { pulseGlow: 'pulseGlow 2s infinite ease-in-out' },
                    keyframes: {
                        pulseGlow: { '0%, 100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.05)' } }
                    }
                }
            }
        }
    </script>
    <style>
        .tab-btn.active { background-color: #0056FF; color: white; }
        .hide { display: none !important; }
        .quiz-card { transition: all 0.3s ease; border-radius: 1.5rem; }
        .quiz-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0, 86, 255, 0.1); }
    </style>
</head>
<body class="bg-white text-brand-dark-blue">

    <header class="p-4 bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b">
        <nav class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html"><img src="logo-final.png" class="h-10"></a>
            <button onclick="document.getElementById('modal').classList.remove('hidden')" class="bg-brand-yellow px-4 py-2 rounded-xl font-bold text-xs animate-pulseGlow">¡USUARIO FUNDADOR!</button>
        </nav>
    </header>

    <main class="py-12 px-4">
        <div class="max-w-4xl mx-auto text-center mb-16">
            <img src="logo-principal-color.png" class="h-24 mx-auto mb-6">
            <h1 class="text-5xl md:text-7xl font-black text-brand-blue mb-6">Domina la <span class="text-brand-yellow">Medicina</span>.</h1>
            <div class="inline-flex p-1 bg-gray-100 rounded-2xl mb-12">
                <button onclick="switchYear('y1')" id="btn1" class="tab-btn active px-8 py-3 rounded-xl font-bold">1er Año</button>
                <button onclick="switchYear('y2')" id="btn2" class="tab-btn px-8 py-3 rounded-xl font-bold">2do Año</button>
            </div>

            <!-- 1ER AÑO -->
            <div id="y1" class="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                <div class="quiz-card p-8 border">
                    <span class="text-[10px] font-black text-brand-blue uppercase">Anatomía</span>
                    <h3 class="text-xl font-black mt-2 mb-4">Drenaje Venoso</h3>
                    <a href="quiz.html" class="block w-full bg-brand-yellow text-center py-3 rounded-xl font-bold">Jugar Ahora</a>
                </div>
                <div class="quiz-card p-8 border">
                    <span class="text-[10px] font-black text-brand-blue uppercase">Historia</span>
                    <h3 class="text-xl font-black mt-2 mb-4">Medicina en Venezuela</h3>
                    <div class="flex gap-2">
                        <a href="quiz-historia-150.html" class="flex-1 bg-gray-100 text-center py-3 rounded-xl font-bold text-sm">150 Preg</a>
                        <a href="quiz-historia-completo.html" class="flex-1 bg-brand-yellow text-center py-3 rounded-xl font-bold text-sm">300 Preg</a>
                    </div>
                </div>
            </div>

            <!-- 2DO AÑO -->
            <div id="y2" class="hide grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                <div class="quiz-card p-8 border border-brand-blue bg-blue-50/30">
                    <div class="flex justify-between">
                        <span class="text-[10px] font-black text-brand-blue uppercase">Fisiología I</span>
                        <span class="bg-green-100 text-green-700 text-[9px] font-black px-2 py-0.5 rounded-full">NUEVO</span>
                    </div>
                    <h3 class="text-xl font-black mt-2 mb-4">Generalidades (100 Retos)</h3>
                    <p class="text-xs text-gray-500 mb-6">Homeostasis, Membrana y Potencial de Acción.</p>
                    <a href="quiz-fisiologia-100.html" class="block w-full bg-brand-blue text-white text-center py-3 rounded-xl font-bold">EMPEZAR RETO</a>
                </div>
                <div class="quiz-card p-8 border">
                    <span class="text-[10px] font-black text-gray-400 uppercase">Fisiología II</span>
                    <h3 class="text-xl font-black mt-2 mb-4">Cardiovascular</h3>
                    <a href="fisiologia-dashboard.html" class="block w-full bg-gray-100 text-gray-400 text-center py-3 rounded-xl font-bold">Dashboard Interactivo</a>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div onclick="document.getElementById('modal').classList.add('hidden')" class="absolute inset-0 bg-brand-dark-blue/80 backdrop-blur-sm"></div>
        <div class="relative bg-white p-8 rounded-3xl w-full max-w-md text-center">
            <h2 class="text-2xl font-black text-brand-blue mb-4">¡Únete a Kraneao!</h2>
            <form action="https://formsubmit.co/esteban.ceo@kraneao.com" method="POST" class="space-y-4 text-left">
                <input type="text" name="name" placeholder="Nombre" required class="w-full p-4 rounded-xl border outline-none focus:border-brand-blue">
                <input type="email" name="email" placeholder="Correo" required class="w-full p-4 rounded-xl border outline-none focus:border-brand-blue">
                <button type="submit" class="w-full bg-brand-yellow py-4 rounded-xl font-black shadow-lg">OBTENER ACCESO</button>
            </form>
        </div>
    </div>

    <script>
        function switchYear(year) {
            document.getElementById('y1').classList.toggle('hide', year === 'y2');
            document.getElementById('y2').classList.toggle('hide', year === 'y1');
            document.getElementById('btn1').classList.toggle('active', year === 'y1');
            document.getElementById('btn2').classList.toggle('active', year === 'y2');
        }
    </script>
</body>
</html>
