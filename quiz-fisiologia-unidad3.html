            {q: "94. La Policitemia Vera es una aberración genética de:", a: ["La Médula Ósea", "Fumar", "Falta de hierro", "Corazón derecho"], c: "La Médula Ósea"},
            {q: "95. El suero se diferencia del plasma in vitro porque:", a: ["No tiene Fibrinógeno ni factores", "Tiene el doble", "No tiene glóbulos rojos", "Son iguales"], c: "No tiene Fibrinógeno ni factores"},
            {q: "96. Coágulo desprendido que viaja por la sangre:", a: ["Émbolo", "Aneurisma", "Ateroma", "Macrófago"], c: "Émbolo"},
            {q: "97. Deficiencia de Vitamina K generará clínicamente:", a: ["Hemorragias severas", "Trombosis", "Anemia", "Parálisis"], c: "Hemorragias severas"},
            {q: "98. Quimioatrayentes para neutrófilos en inflamación:", a: ["Citocinas y Quimiocinas", "Inmunoglobulinas", "Esteroides", "Factor Tisular"], c: "Citocinas y Quimiocinas"},
            {q: "99. 'CEMENTERIO' de los glóbulos rojos:", a: ["Bazo (Pulpa Roja)", "Hígado", "Riñones", "Ganglios"], c: "Bazo (Pulpa Roja)"},
            {q: "100. Desecho amarillo-verdoso final del grupo Hemo:", a: ["Bilirrubina", "Urea", "Ácido Úrico", "Amoníaco"], c: "Bilirrubina"}
        ];

        let cur = 0, points = 0, solved = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function load() {
            solved = false;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('fb').classList.add('hidden');
            const data = quizData[cur];
            
            // LIMPIEZA QUIRÚRGICA: Borra el número al inicio del texto
            document.getElementById('q-text').textContent = data.q.replace(/^[0-9]+\.\s*/, "");
            
            document.getElementById('idx').textContent = cur + 1;
            document.getElementById('total-count').textContent = quizData.length;
            document.getElementById('bar').style.width = ((cur + 1) / quizData.length * 100) + '%';
            
            const container = document.getElementById('opts');
            container.innerHTML = '';
            
            const shuffledOptions = shuffle([...data.a]);
            
            shuffledOptions.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn animate-fade-in';
                btn.innerHTML = `<span class="w-10 h-10 rounded-full border-2 border-gray-100 flex items-center justify-center text-xs font-black mr-2 bg-gray-50">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => check(opt, btn, data.c, data.e);
                container.appendChild(btn);
            });
        }

        function check(selected, btn, correct, explanation) {
            if(solved) return;
            solved = true;
            const btns = document.querySelectorAll('.option-btn');
            
            if(selected === correct) {
                points++;
                btn.classList.add('correct');
            } else {
                btn.classList.add('incorrect');
                btns.forEach(b => { if(b.textContent.includes(correct)) b.classList.add('correct'); });
            }

            if(explanation) {
                const fb = document.getElementById('fb');
                fb.innerHTML = `<strong>ANÁLISIS DE GUYTON:</strong> ${explanation}`;
                fb.className = "mt-10 p-6 rounded-3xl text-sm font-bold border-l-8 " + (selected===correct ? "bg-green-50 border-green-500 text-green-700" : "bg-red-50 border-red-500 text-red-700");
                fb.classList.remove('hidden');
            }

            btns.forEach(b => b.disabled = true);
            document.getElementById('next').classList.remove('hidden');
        }

        document.getElementById('next').onclick = () => {
            cur++;
            if(cur < quizData.length) {
                load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                document.getElementById('card').classList.add('hidden');
                document.getElementById('res').classList.remove('hidden');
                document.getElementById('score').textContent = Math.round((points/quizData.length)*100);
            }
        };

        window.onload = load;
    </script>
</body>
</html>
